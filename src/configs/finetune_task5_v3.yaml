# Fine-tuning config v3: 78 videos (32 original + 46 harvested incl tutorials)
# Target: Qwen2.5-VL-7B-Instruct with LoRA via Unsloth
# Hardware: RTX PRO 6000 Blackwell 97GB VRAM or equivalent
#
# Changes from v2:
#   - 78 videos (was 66): +10 batch 3 harvest (expanded criteria incl tutorials)
#   - 66 train / 12 val scoring, 36 train / 10 val coaching
#   - Still fresh base model (not resuming from v1 or v2 checkpoint)
#   - Dataset path points to v3 prepared data

base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
dataset_path: "training/data/v3"   # Created by scripts/045_prep_v3_training.sh
framework: "unsloth"

# No quantization — 97GB VRAM is plenty for bf16 7B
quantization: "none"
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"

# LoRA config
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training — conservative for 66 scoring examples
num_epochs: 5
batch_size: 4
gradient_accumulation: 2    # effective batch 8
learning_rate: 5.0e-5
warmup_ratio: 0.1
bf16: true
flash_attention_2: true
gradient_checkpointing: false
logging_steps: 5
save_strategy: "steps"
save_steps: 50
eval_strategy: "steps"
eval_steps: 50
save_total_limit: 3
max_seq_length: 2048
packing: false
export_merged_16bit: true
dataloader_num_workers: 4

# Frames
max_frames_per_sample: 20

# Promotion criteria
promotion_threshold_field_agreement: 0.85
promotion_threshold_score_mae: 12.0

# Output
output_dir: "memory/model_checkpoints/v3_diverse"

# Start fresh — do not resume from v1 or v2
resume_from_checkpoint: null
