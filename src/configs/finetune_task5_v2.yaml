# Fine-tuning config v2: Diverse dataset (66 videos: 32 original + 34 harvested)
# Target: Qwen2.5-VL-7B-Instruct with LoRA via Unsloth
# Hardware: RTX PRO 6000 Blackwell 97GB VRAM
#
# Key changes from v1:
#   - Fresh base model (not resuming from overfit v1 checkpoint)
#   - 5 epochs (not 1075 — v1 was massively overtrained)
#   - Lower LR (5e-5 vs 1e-4) since dataset is 2x larger
#   - Eval every 50 steps to catch overfitting early
#   - Dataset path points to v2 prepared data

base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
dataset_path: "training/data/v2"   # Created by scripts/045_prep_v2_training.sh
framework: "unsloth"

# No quantization — 97GB VRAM is plenty for bf16 7B
quantization: "none"
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"

# LoRA config — same as v1, proven architecture
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training — conservative to avoid overfitting on 56 examples
num_epochs: 5
batch_size: 4
gradient_accumulation: 2    # effective batch 8
learning_rate: 5.0e-5       # half of v1 — larger dataset needs less aggressive LR
warmup_ratio: 0.1
bf16: true
flash_attention_2: true
gradient_checkpointing: false  # 97GB has headroom
logging_steps: 5
save_strategy: "steps"
save_steps: 50
eval_strategy: "steps"
eval_steps: 50              # track val loss frequently to catch overfitting
save_total_limit: 3
max_seq_length: 2048
packing: false
export_merged_16bit: true
dataloader_num_workers: 4

# Frames
max_frames_per_sample: 20

# Promotion criteria
promotion_threshold_field_agreement: 0.85
promotion_threshold_score_mae: 12.0    # tighter than v1's 15.0

# Output
output_dir: "memory/model_checkpoints/v2_diverse"

# IMPORTANT: Do NOT resume from v1 checkpoint.
# v1 was trained 1075 epochs on single-trainee data and is overfit.
# Start fresh from base model with the diverse v2 dataset.
resume_from_checkpoint: null
