# Config family: FULL — large-corpus training with external datasets
# Use for: 500+ example runs (LASANA/PETRAW/SimSurg + YouTube corpus)
# Hardware: A100 80 GB (preferred) or H100 — single GPU
# Expected wall time: 4–10 hours depending on corpus size
# Persistent volume: ≥150 GB required (frames + checkpoints accumulate)
#
# Usage:
#   bash deploy/runpod_launch.sh data/training/LATEST src/configs/config_full.yaml

base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
framework: "unsloth"
config_family: "full"
require_vision: true

quantization: "none"
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"

lora_r: 128
lora_alpha: 256
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

num_epochs: 3
batch_size: 4
gradient_accumulation: 4
learning_rate: 2.0e-5
warmup_ratio: 0.05
bf16: true
flash_attention_2: true
gradient_checkpointing: true
logging_steps: 10
save_strategy: "steps"
save_steps: 200
eval_strategy: "steps"
eval_steps: 200
save_total_limit: 3
max_seq_length: 2048
packing: false
export_merged_16bit: true
dataloader_num_workers: 8
max_frames_per_sample: 24
