# Config family: TASK5 DEBUG — smoke test, fast iteration
# Purpose: verify pipeline runs without errors before a real training run
# Use for: pipeline changes, data loader validation, CI / pre-flight checks
# Hardware: any GPU (even 24 GB — 4-bit quantization keeps footprint small)
# Expected wall time: <5 minutes
#
# Usage:
#   bash deploy/runpod_launch.sh data/training/LATEST src/configs/finetune_task5_debug.yaml

purpose: "smoke test — verify pipeline runs without errors"

base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
framework: "unsloth"
fallback_framework: "hf_trainer"
config_family: "debug"

# Vision
vision_mode: true
max_frames_per_sample: 5

# Dataset
max_samples: 50
split_strategy: "trainee_holdout"
eval_metrics:
  - mae_fls_score
  - mae_completion_time
  - f1_penalty_detection
  - phase_iou

# Quantization
quantization: "4bit"
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"

# LoRA — minimal rank for smoke test
lora_r: 16
lora_alpha: 32
lora_dropout: 0.0
lora_target_modules:
  - q_proj
  - v_proj

# Training
num_epochs: 1
batch_size: 1
gradient_accumulation: 1
learning_rate: 2.0e-5
warmup_ratio: 0.0
bf16: true
flash_attention_2: false
gradient_checkpointing: true
logging_steps: 1
save_strategy: "no"
eval_strategy: "no"
max_seq_length: 1024
packing: false
export_merged_16bit: false
dataloader_num_workers: 0

# Output
output_dir: "memory/model_checkpoints/debug"
resume_from_checkpoint: null
