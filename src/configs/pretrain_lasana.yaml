# Config family: LASANA PRETRAIN — Stage 1 transfer layer before Task 5 fine-tune
# Purpose: broaden visual/task diversity before Stage 2 Task 5 specialization
# Use for: LASANA-only pretrain runs after building data/training/LATEST_LASANA
# Hardware: H200 / A100 80 GB / RTX PRO 6000 Blackwell 97 GB (single GPU)

purpose: "Stage-1 LASANA pretrain — diversity layer for Task5 transfer"
base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
framework: "unsloth"
fallback_framework: "hf_trainer"
config_family: "pretrain"

vision_mode: true
require_vision: true
max_frames_per_sample: 10
dataset_path: "data/training/LATEST_LASANA"
split_strategy: "lasana_published"

quantization: "4bit"
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"

lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Sized for ~1,000 train samples; effective batch 8 => ~125 steps/epoch.
num_epochs: 3
batch_size: 2
gradient_accumulation: 4
learning_rate: 1.0e-5
warmup_ratio: 0.05
bf16: true
flash_attention_2: true
gradient_checkpointing: true
logging_steps: 5
save_strategy: "epoch"
eval_strategy: "epoch"
save_total_limit: 3
max_seq_length: 2048
packing: false
export_merged_16bit: false
dataloader_num_workers: 4

output_dir: "memory/model_checkpoints/lasana_pretrain"
resume_from_checkpoint: null