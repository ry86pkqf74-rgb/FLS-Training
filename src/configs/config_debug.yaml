# Config family: DEBUG — fast iteration, minimal cost
# Use for: smoke-testing pipeline changes, verifying data loading, CI
# Hardware: any GPU (even 24 GB)
# Expected wall time: <5 minutes
#
# Usage:
#   bash deploy/runpod_launch.sh data/training/LATEST src/configs/config_debug.yaml

base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
framework: "unsloth"
config_family: "debug"

quantization: "4bit"
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"

lora_r: 16
lora_alpha: 32
lora_dropout: 0.0
lora_target_modules:
  - q_proj
  - v_proj

num_epochs: 1
batch_size: 2
gradient_accumulation: 1
learning_rate: 1.0e-4
warmup_ratio: 0.0
bf16: true
flash_attention_2: false
gradient_checkpointing: true
logging_steps: 1
save_strategy: "no"
eval_strategy: "no"
max_seq_length: 1024
packing: false
export_merged_16bit: false
dataloader_num_workers: 0
max_frames_per_sample: 4
