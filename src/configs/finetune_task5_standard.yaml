# Config family: TASK5 STANDARD — daily development run
# Purpose: routine fine-tuning with current corpus; balances quality and speed
# Use for: iterative development runs between data harvesting batches
# Hardware: H200 / A100 80 GB / RTX PRO 6000 Blackwell 97 GB (single GPU)
# Expected wall time: ~2–4 hours on H200
#
# Usage:
#   bash deploy/runpod_launch.sh data/training/LATEST src/configs/finetune_task5_standard.yaml

purpose: "daily development run — ~2-4 hours on H200"

base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
framework: "unsloth"
fallback_framework: "hf_trainer"
config_family: "standard"

# Vision
vision_mode: true
require_vision: true              # fail-fast if dataset has no image blocks
max_frames_per_sample: 10

# Dataset
max_samples: null  # use all available
split_strategy: "trainee_holdout"
eval_metrics:
  - mae_fls_score
  - mae_completion_time
  - f1_penalty_detection
  - phase_iou

# Quantization
quantization: "4bit"
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"

# LoRA
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training
# Sized for v4 dataset (~144 train, effective batch 8 = 18 steps/epoch).
# 3 epochs = 54 steps was too thin; eval/save_steps=100 would have produced
# zero evals/checkpoints over the run. Patched 2026-04-08.
num_epochs: 5                     # was 3; 5 epochs ≈ 90 optimizer steps
batch_size: 2
gradient_accumulation: 4          # effective batch size 8
learning_rate: 2.0e-5
warmup_ratio: 0.1                 # was 0.05; ~9 steps over 90, healthier
bf16: true
flash_attention_2: true
gradient_checkpointing: true
logging_steps: 1                  # was 5; want every step visible at this scale
save_strategy: "epoch"            # was "steps"/100 — would have saved 0 times
eval_strategy: "epoch"            # was "steps"/100 — would have eval'd 0 times
save_total_limit: 3
max_seq_length: 2048
packing: false
export_merged_16bit: true
dataloader_num_workers: 4

# Output
output_dir: "memory/model_checkpoints/task5_standard"
# Uncomment after LASANA Stage 1 finishes and the checkpoint exists on the pod.
# resume_from_checkpoint: "memory/model_checkpoints/lasana_pretrain"
resume_from_checkpoint: null
