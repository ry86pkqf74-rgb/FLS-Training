# Config family: TASK5 FULL — publication-grade training run
# Purpose: highest-quality model; only run after corpus is mature
# Use for: submission-ready weights; requires ≥100 ACCEPTED videos
# Hardware: H200 (single GPU preferred) — 4-bit keeps footprint manageable
# Expected wall time: 12–24 hours on H200
#
# Prerequisite: python scripts/026_auto_validate.py --report
#   Confirm ≥100 videos with status=ACCEPTED before launching.
#
# Usage:
#   bash deploy/runpod_launch.sh data/training/LATEST src/configs/finetune_task5_full.yaml

purpose: "publication-grade — 12-24 hours on H200, only after ≥100 ACCEPTED videos"

base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
framework: "unsloth"
fallback_framework: "hf_trainer"
config_family: "full"

# Vision
vision_mode: true
max_frames_per_sample: 20

# Dataset
max_samples: null  # use all available
split_strategy: "trainee_holdout"
eval_metrics:
  - mae_fls_score
  - mae_completion_time
  - f1_penalty_detection
  - phase_iou

# Quantization
quantization: "4bit"
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"

# LoRA — wider rank for publication quality
lora_r: 128
lora_alpha: 256
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training
num_epochs: 5
batch_size: 4
gradient_accumulation: 4  # effective batch size 16
learning_rate: 1.0e-5
warmup_ratio: 0.1
bf16: true
flash_attention_2: true
gradient_checkpointing: true
logging_steps: 10
save_strategy: "steps"
save_steps: 200
eval_strategy: "steps"
eval_steps: 200
save_total_limit: 5
max_seq_length: 2048
packing: false
export_merged_16bit: true
dataloader_num_workers: 8

# Promotion criteria
promotion_threshold_field_agreement: 0.90
promotion_threshold_score_mae: 10.0

# Output
output_dir: "memory/model_checkpoints/task5_full"
resume_from_checkpoint: null
