# Fine-tuning configuration for FLS Task 5 scoring model
# Target: Qwen2.5-VL-7B-Instruct with LoRA via Unsloth
# Hardware: H200 141GB HBM3e (Vast.ai / RunPod / Lambda)
# Expected: <20 min training, ~$1-2 total GPU cost

base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
dataset_path: "data/training/LATEST"  # Replace with actual date_version dir
framework: "unsloth"  # unsloth (preferred) or hf_trainer (fallback)

# Quantization — H200 has 141GB: skip quantization for best quality
quantization: "none"        # "none" = full bf16 LoRA (best quality, H200 has room)
                            # "4bit" = QLoRA (fallback for smaller GPUs)
bnb_4bit_compute_dtype: "bfloat16"  # only used if quantization: "4bit"
bnb_4bit_quant_type: "nf4"

# LoRA — larger rank feasible on H200
lora_r: 64                  # higher rank = more capacity (141GB handles this easily)
lora_alpha: 128             # 2× lora_r
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj              # H200 headroom: target MLP layers too
  - up_proj
  - down_proj

# Training — tuned for H200 throughput
num_epochs: 2
batch_size: 4               # H200 141GB fits batch 4-8 in bf16 LoRA for 7B
gradient_accumulation: 2    # effective batch 8
learning_rate: 1.0e-4
warmup_ratio: 0.1
bf16: true
flash_attention_2: true
gradient_checkpointing: false  # not needed on H200 — 141GB has headroom, disabling = faster
logging_steps: 5
save_strategy: "epoch"
eval_strategy: "epoch"
dataloader_num_workers: 4
save_steps: 200
save_total_limit: 2
max_seq_length: 2048
packing: false
export_merged_16bit: true

# Frames
max_frames_per_sample: 20

# Promotion criteria (used by scripts/050_evaluate.py)
promotion_threshold_field_agreement: 0.90
promotion_threshold_score_mae: 15.0

# Output
output_dir: null  # auto-generated from date + run_id

# Hardware tiers (pick based on availability/price):
#   H200 141GB SXM:  ~$3-4/hr spot, <20 min training, BEST quality (no quant needed)
#   H100 80GB SXM:   ~$2-3/hr spot, <30 min, use quantization: "4bit" or batch_size: 2
#   A100 80GB SXM:   ~$1.50-2/hr spot, <45 min, use quantization: "4bit"
#   A100 40GB:       ~$1-1.50/hr, ~1 hr, quantization: "4bit", batch_size: 1
#   L40S 48GB:       ~$0.80/hr, ~1-1.5 hr, quantization: "4bit", batch_size: 1
#   RTX 4090 24GB:   ~$0.40/hr, ~2-4 hr, quantization: "4bit", batch_size: 1, lora_r: 16
