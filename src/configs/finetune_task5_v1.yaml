# Fine-tuning configuration for FLS Task 5 scoring model
# Target: Qwen2.5-VL-7B-Instruct with LoRA on RunPod A100 80GB

base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
dataset_path: "data/training/LATEST"  # Replace with actual date_version dir

# LoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj

# Training
num_epochs: 3
batch_size: 1
gradient_accumulation: 8
learning_rate: 2.0e-5
warmup_ratio: 0.1
bf16: true
logging_steps: 10

# Frames
max_frames_per_sample: 20

# Output
output_dir: null  # auto-generated from date + run_id
