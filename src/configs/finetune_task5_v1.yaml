# Fine-tuning configuration for FLS Task 5 scoring model
# Target: Qwen2.5-VL-7B-Instruct with QLoRA via Unsloth
# Hardware: RunPod spot RTX 4090 24GB (~$0.40/hr) or L40S
# Expected cost: <$15 for first fine-tune run

base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
dataset_path: "data/training/LATEST"  # Replace with actual date_version dir
framework: "unsloth"  # unsloth (preferred) or hf_trainer (fallback)

# Quantization
quantization: "4bit"  # bnb nf4 — cuts VRAM from ~28GB to ~8GB
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_quant_type: "nf4"

# LoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj

# Training
num_epochs: 2          # small dataset (~26 videos) — 2 is enough, 3 risks overfit
batch_size: 1
gradient_accumulation: 4  # effective batch 4
learning_rate: 1.0e-4     # higher LR for QLoRA (vs 2e-5 for full LoRA)
warmup_ratio: 0.1
bf16: true
flash_attention_2: true
gradient_checkpointing: true
logging_steps: 10
save_strategy: "epoch"
eval_strategy: "epoch"

# Frames
max_frames_per_sample: 20

# Promotion criteria (used by scripts/050_evaluate.py)
promotion_threshold_field_agreement: 0.90  # student must match frontier on 90%+ fields
promotion_threshold_score_mae: 15.0        # max mean absolute error on FLS score

# Output
output_dir: null  # auto-generated from date + run_id

# Hardware notes:
#   RTX 4090 24GB: ~2-4 GPU-hours for 26 videos × 2 epochs (<$10 spot)
#   L40S 48GB:     ~1-2 GPU-hours, more headroom
#   A100 80GB:     overkill for 7B QLoRA — save money
