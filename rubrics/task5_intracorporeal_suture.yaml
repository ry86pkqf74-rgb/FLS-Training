task: task5_intracorporeal_suture
name: "Intracorporeal Suture with Knot Tying"
fls_manual_reference: "FLS Manual Skills Guidelines, Task 5"

max_time_seconds: 600
score_formula: "600 - completion_time - penalties"
passing_score: 475  # approximate proficiency cutoff

equipment:
  - "FLS trainer box"
  - "Penrose drain on suture block (slit longitudinally)"
  - "15cm 2-0 silk suture on needle"
  - "Two needle drivers"
  - "Laparoscopic scissors"
  - "Two pre-placed marks on drain (entry/exit points)"

phases:
  - name: needle_load
    description: "Pick up needle with driver, orient for driving"
    expert_time_range: [3, 8]
    intermediate_range: [5, 15]

  - name: suture_placement
    description: "Drive needle through both marks on the drain"
    expert_time_range: [10, 20]
    intermediate_range: [15, 35]

  - name: first_throw
    description: "Surgeon's knot (double throw). Right hand leads (typically)"
    expert_time_range: [10, 18]
    intermediate_range: [15, 30]
    requirements:
      - "Must be a double throw (surgeon's knot)"
      - "Note which hand leads the wrap"

  - name: second_throw
    description: "Single throw, switch hands from first"
    expert_time_range: [8, 15]
    intermediate_range: [12, 25]
    requirements:
      - "Must switch leading hand from throw 1"
      - "Single throw only"

  - name: third_throw
    description: "Single throw, switch hands from second"
    expert_time_range: [8, 15]
    intermediate_range: [12, 25]
    requirements:
      - "Must switch leading hand from throw 2"
      - "Single throw only"

  - name: suture_cut
    description: "Cut both suture ends with laparoscopic scissors"
    expert_time_range: [5, 12]
    intermediate_range: [10, 30]

penalties:
  - name: suture_deviation
    description: "Sum of mm deviation from each mark"
    scoring: "1 point per mm total deviation"

  - name: gap_visible
    description: "Gap visible in drain slit after knot"
    scoring: "Variable penalty (5-15 points)"

  - name: knot_failure
    description: "Knot slips or comes apart"
    scoring: "Major penalty (25-50 points)"

  - name: drain_avulsion
    description: "Drain pulled off suture block"
    scoring: "Automatic zero"

  - name: hand_switch_failure
    description: "Failure to alternate hands between throws"
    scoring: "Penalty per missed switch"
